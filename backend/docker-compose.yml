version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: codesage_db
    restart: always
    environment:
      POSTGRES_USER: codesage
      POSTGRES_PASSWORD: codesage_password
      POSTGRES_DB: codesage_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: codesage_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: codesage_web
    restart: always
    command: python run.py
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://codesage:codesage_password@db:5432/codesage_db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: codesage_worker
    restart: always
    command: celery -A app.tasks.worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://codesage:codesage_password@db:5432/codesage_db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
